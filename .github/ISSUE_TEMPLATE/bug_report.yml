name: Bug report
description: Something isn't working
labels: ['bug']
body:
  - type: dropdown
    id: os
    attributes:
      label: macOS version
      options:
        - macOS 15 (Sequoia)
        - macOS 14 (Sonoma)
        - macOS 13 (Ventura)
        - Other
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Vox version
      placeholder: 'e.g. 1.2.0'
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open Vox
        2. ...
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs or errors
      description: Open DevTools with ⌘⌥I and paste any relevant console output.
      render: shell
